{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django</title>

    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/font.css' %}"/>
    <link rel="stylesheet" href="{% static 'css/icon.css' %}"/>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <script src="http://ajax.googleapis.com/ajax/libs/jquery/1.9.1/jquery.min.js"></script>

</head>
<body>
    
    {% if messages %}
    <div class="messages">
        {% for message in messages %}
        <p>{{ message }}</p>
        {% endfor %}
    </div>
    {% endif %}

    {% if user.is_authenticated %}
    <section class="headings">
        <h2>Django 420</h2>
        <a href="signout"><input type="button" class="btn btn-primary signout" value="SignOut"></a>
    </section>
    <section class="row content">
        <nav class="col-2">
            <ul>
                <a href="profile"><button class="btn btn-primary">Profile</button></a>
            </ul>
        </nav>
        <section class="col-10 extended-content">
            {% block content %}
            {% endblock %}
        </section>
    </section>
    {% else %}
    <section style="margin: 0 0 0 1%;">
        {% block sign %}
        {% endblock %}
    </section>
    {% endif %}

    <script>
        
        $(document).on('submit', '#post-form', function(e){
            e.preventDefault();
        
            $.ajax({
                type:'POST',
                url:'/chat',
                data:{
                    name:$('#text_area').val(),
                    csrfmiddlewaretoken:$('input[name=csrfmiddlewaretoken]').val(),
                },
                success: function(data){
                    document.getElementById('mesgs').innerHTML = data;
                    document.getElementById("text_area").value = '';
                }
            });
        });
    </script>

    <script src="{% static 'js/main.js' %}"></script>

</body>
</html>
