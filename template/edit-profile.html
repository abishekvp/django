{% extends 'index.html' %}
{% load static %}
{% block content %}
{% if user.is_authenticated %}
<section class="section-edi-profile">
    <form method="post" class="edit-profile col-5">
    {% csrf_token %}
    {% if user_data %}
        <div class="input-group">
            <label for="username">Username</label>
            <span id="username">: {{ user_data.username }}</span>
        </div>
        <div class="input-group">
            <label for="name">Name</label>
            <span id="name">: <input type="text" name="name" id="name"></span>
        </div>
        <div class="input-group">
            <label for="email">Email</label>
            <span id="email">: {{ user_data.email }}</span>
        </div>
        <div class="input-group">
            <label for="contact">Contact</label>
            <span id="contact">: <input type="text" name="contact" id="contact"></span>
        </div>
        <input type="submit" class="btn btn-primary" value="Update">
    {% endif %}
    </form>
</section>
{% endif %}
{% endblock %}
